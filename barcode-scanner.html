<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Сканер штрихкодов</title>
<script src="https://unpkg.com/@zxing/library@0.19.3/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #252525;
    --border: #333;
    --accent: #00e5a0;
    --accent-dim: #00a070;
    --text: #f0f0f0;
    --muted: #888;
    --danger: #ff4d4d;
    --blue: #4da6ff;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'SF Pro Display', -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  header .logo svg { width: 18px; height: 18px; }

  header h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  header .count-badge {
    margin-left: auto;
    background: var(--accent-dim);
    color: #000;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    min-width: 28px;
    text-align: center;
  }

  .main { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

  /* === CAMERA === */
  .camera-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }

  #video-container {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    display: none;
  }

  #video-container video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .scan-frame {
    width: 70%;
    height: 35%;
    border: 2px solid var(--accent);
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
    position: relative;
  }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    top: 10%;
    height: 2px;
    background: var(--accent);
    opacity: 0.8;
    animation: scanAnim 1.8s ease-in-out infinite;
  }

  @keyframes scanAnim {
    0%, 100% { top: 10%; }
    50% { top: 85%; }
  }

  .scan-corner {
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--accent);
    border-style: solid;
  }
  .scan-corner.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .scan-corner.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .scan-corner.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .scan-corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  .camera-placeholder {
    height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
  }

  .camera-placeholder svg { opacity: 0.4; }

  .camera-placeholder p { font-size: 14px; }

  .camera-controls {
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    padding: 11px 18px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 7px;
  }

  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: var(--accent);
    color: #000;
    flex: 1;
  }

  .btn-stop {
    background: var(--surface2);
    color: var(--danger);
    border: 1px solid var(--border);
    flex: 1;
  }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-xls {
    background: #1a7a3a;
    color: #fff;
  }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  /* === LAST SCAN === */
  .last-scan {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 14px;
    display: none;
  }

  .last-scan.show { display: block; }

  .last-scan-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .barcode-display {
    font-family: 'Courier New', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 12px;
    word-break: break-all;
  }

  .qty-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .qty-label { font-size: 14px; color: var(--muted); white-space: nowrap; }

  .qty-controls {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .qty-btn {
    width: 40px; height: 40px;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }

  .qty-btn:active { background: var(--surface); }

  #qty-input {
    width: 60px; height: 40px;
    background: transparent;
    border: none;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    outline: none;
  }

  #qty-input::-webkit-inner-spin-button,
  #qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .btn-add {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    padding: 0 18px;
    height: 40px;
    cursor: pointer;
    flex: 1;
    transition: all 0.15s;
  }

  .btn-add:active { transform: scale(0.96); }

  /* === MANUAL INPUT === */
  .manual-section {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 14px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }

  .manual-row {
    display: flex;
    gap: 8px;
  }

  .text-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .text-input:focus { border-color: var(--accent); }
  .text-input::placeholder { color: var(--muted); }

  #manual-barcode { flex: 2; font-family: 'Courier New', monospace; letter-spacing: 1px; }
  #manual-qty { flex: 0 0 70px; text-align: center; }

  /* === LIST === */
  .list-section {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .list-header {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .list-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .list-actions {
    display: flex;
    gap: 8px;
  }

  .list-table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead th {
    background: var(--surface2);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  thead th:last-child { text-align: center; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:active { background: var(--surface2); }

  td {
    padding: 11px 14px;
    vertical-align: middle;
  }

  .td-num {
    font-size: 12px;
    color: var(--muted);
    width: 32px;
  }

  .td-barcode {
    font-family: 'Courier New', monospace;
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--accent);
  }

  .td-qty {
    font-weight: 700;
    font-size: 16px;
    text-align: center;
    width: 60px;
  }

  .td-del {
    text-align: center;
    width: 40px;
  }

  .del-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.1s;
    line-height: 1;
  }

  .del-btn:active { color: var(--danger); background: rgba(255,77,77,0.1); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .empty-state svg { opacity: 0.3; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  /* === TOAST === */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--accent);
    color: #000;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.25s;
    z-index: 999;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.error {
    background: var(--danger);
    color: #fff;
  }

  /* === BOTTOM SAFE AREA === */
  .safe-bottom { height: 24px; }

  /* Scanning state */
  body.scanning .camera-placeholder { display: none; }
  body.scanning #video-container { display: block; }

  .flash {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
    transition: opacity 0.1s;
  }

  .flash.active { opacity: 0.3; }

  @media (min-width: 500px) {
    .main { max-width: 480px; margin: 0 auto; padding: 20px; }
  }
</style>
</head>
<body>

<div class="flash" id="flash"></div>
<div class="toast" id="toast"></div>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5">
      <rect x="2" y="4" width="3" height="16" rx="0.5"/>
      <rect x="7" y="4" width="1.5" height="16" rx="0.5"/>
      <rect x="10.5" y="4" width="3" height="16" rx="0.5"/>
      <rect x="15.5" y="4" width="1.5" height="16" rx="0.5"/>
      <rect x="18.5" y="4" width="3" height="16" rx="0.5"/>
    </svg>
  </div>
  <h1>Сканер штрихкодов</h1>
  <div class="count-badge" id="count-badge">0</div>
</header>

<div class="main">

  <!-- CAMERA -->
  <div class="camera-card">
    <div id="video-container">
      <video id="video" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div class="scan-frame">
          <div class="scan-line"></div>
          <div class="scan-corner tl"></div>
          <div class="scan-corner tr"></div>
          <div class="scan-corner bl"></div>
          <div class="scan-corner br"></div>
        </div>
      </div>
    </div>
    <div class="camera-placeholder" id="camera-placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <p>Нажмите «Сканировать» для запуска камеры</p>
    </div>
    <div class="camera-controls">
      <button class="btn btn-primary" id="btn-scan" onclick="startScan()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Сканировать
      </button>
      <button class="btn btn-stop" id="btn-stop" onclick="stopScan()" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
        </svg>
        Стоп
      </button>
      <button class="btn btn-secondary" onclick="toggleManual()" title="Ручной ввод">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- LAST SCAN RESULT -->
  <div class="last-scan" id="last-scan">
    <div class="last-scan-label">Последнее сканирование</div>
    <div class="barcode-display" id="barcode-display">—</div>
    <div class="qty-row">
      <span class="qty-label">Кол-во:</span>
      <div class="qty-controls">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <input type="number" id="qty-input" value="1" min="1" max="9999">
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
      <button class="btn-add" onclick="addItem()">Добавить ✓</button>
    </div>
  </div>

  <!-- MANUAL INPUT -->
  <div class="manual-section" id="manual-section" style="display:none">
    <div class="section-header">
      <span class="section-title">Ручной ввод EAN-13</span>
    </div>
    <div class="manual-row">
      <input class="text-input" type="tel" id="manual-barcode" maxlength="13" placeholder="4600001234567">
      <input class="text-input" type="number" id="manual-qty" value="1" min="1" max="9999" placeholder="Кол">
      <button class="btn btn-primary" onclick="addManual()" style="padding:10px 14px; flex-shrink:0">+</button>
    </div>
  </div>

  <!-- LIST -->
  <div class="list-section">
    <div class="list-header">
      <div class="list-header-left">
        <span class="section-title">Список товаров</span>
      </div>
      <div class="list-actions">
        <button class="btn btn-xls" onclick="exportXLS()" id="btn-xls">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="8" y1="13" x2="16" y2="13"/>
            <line x1="8" y1="17" x2="16" y2="17"/>
          </svg>
          XLS
        </button>
        <button class="btn btn-danger" onclick="clearAll()" id="btn-clear" style="padding:10px 12px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="list-table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>EAN-13</th>
            <th style="text-align:center">Кол-во</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="list-body">
          <tr id="empty-row">
            <td colspan="4">
              <div class="empty-state">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="2" y="4" width="3" height="16" rx="0.5"/>
                  <rect x="7" y="4" width="1.5" height="16" rx="0.5"/>
                  <rect x="10.5" y="4" width="3" height="16" rx="0.5"/>
                  <rect x="15.5" y="4" width="1.5" height="16" rx="0.5"/>
                  <rect x="18.5" y="4" width="3" height="16" rx="0.5"/>
                </svg>
                <p>Список пуст. Отсканируйте первый товар.</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="safe-bottom"></div>
</div>

<script>
  let items = [];
  let currentBarcode = null;
  let codeReader = null;
  let scanning = false;
  let lastScanned = '';
  let lastScannedTime = 0;

  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function flashScreen() {
    const f = document.getElementById('flash');
    f.classList.add('active');
    setTimeout(() => f.classList.remove('active'), 120);
  }

  function vibrate(p) {
    if (navigator.vibrate) navigator.vibrate(p);
  }

  async function startScan() {
    try {
      if (!codeReader) {
        codeReader = new ZXing.BrowserMultiFormatReader();
      }
      const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();
      if (!devices.length) { showToast('Камера не найдена', true); return; }
      const backCam = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[devices.length - 1];

      document.body.classList.add('scanning');
      document.getElementById('btn-scan').style.display = 'none';
      document.getElementById('btn-stop').style.display = '';
      scanning = true;

      await codeReader.decodeFromVideoDevice(backCam.deviceId, 'video', (result, err) => {
        if (result) {
          const code = result.getText();
          const now = Date.now();
          if (code === lastScanned && now - lastScannedTime < 1500) return;
          lastScanned = code;
          lastScannedTime = now;
          onBarcodeDetected(code);
        }
      });
    } catch (e) {
      showToast('Ошибка камеры: ' + e.message, true);
    }
  }

  function stopScan() {
    if (codeReader) {
      codeReader.reset();
    }
    scanning = false;
    document.body.classList.remove('scanning');
    document.getElementById('btn-scan').style.display = '';
    document.getElementById('btn-stop').style.display = 'none';
  }

  function onBarcodeDetected(code) {
    flashScreen();
    vibrate([40, 30, 40]);
    currentBarcode = code;
    document.getElementById('barcode-display').textContent = code;
    document.getElementById('qty-input').value = 1;
    document.getElementById('last-scan').classList.add('show');
    document.getElementById('qty-input').focus();
    document.getElementById('qty-input').select();
  }

  function changeQty(d) {
    const inp = document.getElementById('qty-input');
    let v = parseInt(inp.value) || 1;
    v = Math.max(1, v + d);
    inp.value = v;
  }

  function addItem() {
    if (!currentBarcode) return;
    const qty = parseInt(document.getElementById('qty-input').value) || 1;
    const existing = items.find(i => i.barcode === currentBarcode);
    if (existing) {
      existing.qty += qty;
      showToast('Обновлено: +' + qty + ' шт');
    } else {
      items.push({ barcode: currentBarcode, qty });
      showToast('Добавлено ✓');
    }
    vibrate(60);
    renderList();
    document.getElementById('last-scan').classList.remove('show');
    currentBarcode = null;
  }

  function toggleManual() {
    const s = document.getElementById('manual-section');
    s.style.display = s.style.display === 'none' ? 'block' : 'none';
    if (s.style.display === 'block') document.getElementById('manual-barcode').focus();
  }

  function addManual() {
    const bc = document.getElementById('manual-barcode').value.trim();
    const qty = parseInt(document.getElementById('manual-qty').value) || 1;
    if (!bc || bc.length < 8) { showToast('Введите корректный штрихкод', true); return; }
    const existing = items.find(i => i.barcode === bc);
    if (existing) {
      existing.qty += qty;
      showToast('Обновлено: +' + qty + ' шт');
    } else {
      items.push({ barcode: bc, qty });
      showToast('Добавлено ✓');
    }
    vibrate(60);
    document.getElementById('manual-barcode').value = '';
    document.getElementById('manual-qty').value = 1;
    renderList();
    document.getElementById('manual-barcode').focus();
  }

  document.getElementById('manual-barcode').addEventListener('keydown', e => {
    if (e.key === 'Enter') addManual();
  });

  document.getElementById('qty-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  function deleteItem(idx) {
    if (confirm('Удалить ' + items[idx].barcode + '?')) {
      items.splice(idx, 1);
      renderList();
    }
  }

  function clearAll() {
    if (!items.length) return;
    if (confirm('Очистить весь список (' + items.length + ' позиций)?')) {
      items = [];
      renderList();
      showToast('Список очищен');
    }
  }

  function renderList() {
    const body = document.getElementById('list-body');
    document.getElementById('count-badge').textContent = items.length;
    if (!items.length) {
      body.innerHTML = `<tr id="empty-row"><td colspan="4"><div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="4" width="3" height="16" rx="0.5"/>
          <rect x="7" y="4" width="1.5" height="16" rx="0.5"/>
          <rect x="10.5" y="4" width="3" height="16" rx="0.5"/>
          <rect x="15.5" y="4" width="1.5" height="16" rx="0.5"/>
          <rect x="18.5" y="4" width="3" height="16" rx="0.5"/>
        </svg>
        <p>Список пуст. Отсканируйте первый товар.</p></div></td></tr>`;
      return;
    }
    body.innerHTML = items.map((item, i) => `
      <tr>
        <td class="td-num">${i + 1}</td>
        <td class="td-barcode">${item.barcode}</td>
        <td class="td-qty">${item.qty}</td>
        <td class="td-del">
          <button class="del-btn" onclick="deleteItem(${i})">×</button>
        </td>
      </tr>
    `).join('');
  }

  function exportXLS() {
    if (!items.length) { showToast('Список пуст', true); return; }
    const ws_data = [['EAN-13', 'Количество']];
    items.forEach(i => ws_data.push([i.barcode, i.qty]));

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(ws_data);

    ws['!cols'] = [{ wch: 18 }, { wch: 12 }];

    const headerStyle = { font: { bold: true }, alignment: { horizontal: 'center' } };
    ['A1', 'B1'].forEach(cell => {
      if (!ws[cell].s) ws[cell].s = {};
      ws[cell].s = headerStyle;
    });

    XLSX.utils.book_append_sheet(wb, ws, 'Сканирование');
    const date = new Date();
    const fname = `scan_${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}_${String(date.getHours()).padStart(2,'0')}${String(date.getMinutes()).padStart(2,'0')}.xlsx`;
    XLSX.writeFile(wb, fname);
    showToast('Файл сохранён: ' + fname);
    vibrate([40, 20, 40, 20, 80]);
  }

  renderList();
</script>
</body>
</html>
